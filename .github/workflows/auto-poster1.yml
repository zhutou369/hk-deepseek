name: Gemini Auto Content Updater

on:
  # 🎯 每天北京/香港時間早上 08:12 自動觸發更新 (100% 準時交由外部 Cloudflare 轟炸喚醒)
  schedule:
    - cron: '12 0 * * *'

  # 🎯 手動測試觸發：允許在 GitHub 介面手動點擊按鈕，並配置可輸入的數字選項
  workflow_dispatch:
    inputs:
      post_count:
        description: '本次手動測試生成的文章數量（可選 1-9，不填寫默認更新 1 篇）'
        required: true
        default: '1' # 🌟 核心優化：手動測試默認也改為 1 篇

# 🚀 2026 規範：在全局顯式注入強制使用 Node 24 的環境變量
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TZ: 'Asia/Hong_Kong' # 強制伺服器時區為香港標準時間，確保與你的站群完全對齊

# 允許機器人反向寫入倉庫的最高權限
permissions:
  contents: write

jobs:
  build-and-post:
    runs-on: ubuntu-latest

    steps:
    # 1. 檢出 11ty 項目的全部源碼
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. 部署最新一代的 Node.js 24 生產環境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm' # 自動緩存依賴，加速後續構建

    # 3a. 🛠️ 如果 package.json 存在，則執行 npm install
    - name: Install Existing Dependencies
      run: npm install
      if: hashFiles('package.json') != ''

    # 3b. 🛠️ 如果 package.json 不存在，則初始化
    - name: Initialize Project If Missing
      run: npm init -y
      if: hashFiles('package.json') == ''

    # 3c. 安裝核心官方 AI SDK 與 11ty 構建工具
    - name: Install Production Tools
      run: npm install @google/genai @11ty/eleventy --save-dev

    # 4. 運行内容生成器生成新文章
    - name: Run Gemini Content Generator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node autobot.js ${{ github.event.inputs.post_count || '1' }}

    # 5. 強制解鎖 node_modules 可執行特權并编译网站
    # (同時在 src 源码目录和 _site 编译目录双重塞入验证文件，确保跟着源码一起被推回 GitHub)
    - name: Build Eleventy Site
      env:
        INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
      run: |
        chmod -R +x ./node_modules/.bin/
        if [ -n "$INDEXNOW_KEY" ]; then
          echo "$INDEXNOW_KEY" > ./src/$INDEXNOW_KEY.txt
        fi
        npx @11ty/eleventy
        if [ -n "$INDEXNOW_KEY" ]; then
          echo "$INDEXNOW_KEY" > ./_site/$INDEXNOW_KEY.txt
          echo "✅ 成功在内存源码与发布目录创建必应物理校验文件"
        fi

    # 6. 檢查是否有新文章和驗證文件誕生，第一時間暴力推回 GitHub 主網触发线上托管商编译
    - name: Commit and Push Changes back to Repo
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Gemini-Content-Bot"
        git config --global user.email "bot@yourdomain.com"
        
        # 🌟 除了文章和词库，把必应的校验 txt 文件也一起打包强推上去！
        git add src/posts/ src/keywords.json src/*.txt
        
        if ! git diff --cached --quiet; then
          git commit -m "🤖 [Bot] 自動同步/手動測試：更新文章、驗證文件並同步詞庫"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main -f
          echo "✅ 成功將新文章與更新後的詞庫、驗證文件同步回 GitHub 遠端倉庫！"
        else
          echo "⚠️ 檢查發現本地文件無任何变化，本次自動跳過源碼推送。"
        fi

    # 7. 🌟【智能化决胜步骤】线上文件不生效不推送，开启主动网络探测 🌟
    - name: Execute Instant SEO Push to Bing
      env:
        INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
      run: |
        DOMAIN="hk-deepseek.com"
        VALIDATION_URL="https://${DOMAIN}/${INDEXNOW_KEY}.txt"
        
        echo "📡 开始智能探测线上验证文件状态: ${VALIDATION_URL}"
        
        # 🔄 用一个最大循环 30 次的死循环（最多等 2.5 分钟），每 5 秒用 cURL 检测一次线上文件状态
        for i in {1..30}; do
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${VALIDATION_URL}")
          if [ "$STATUS_CODE" = "200" ]; then
            echo "🎉 极佳！检测到线上验证文件已 100% 同步生效 (HTTP 200)。准备发射 API..."
            break
          else
            echo "⏳ 线上服务仍在构建中/CDN尚未刷新 (当前状态: ${STATUS_CODE})，等待 5 秒 (尝试 ${i}/30)..."
            sleep 5
          fi
          
          if [ $i -eq 30 ]; then
            echo "⚠️ 警告：等待线上托管同步超时，将尝试强行推送。"
          fi
        done
        
        # 🌟 终极纯原生写入：将代码拆分为纯数组，彻底避开一切长文本截断、反引号冲突及多行转义地狱 🌟
        node -e '
        const fs = require("fs");
        const lines = [
          "const fs = require(\"fs\");",
          "const path = require(\"path\");",
          "const https = require(\"https\");",
          "const DOMAIN = \"hk-deepseek.com\";",
          "const BING_KEY = process.env.INDEXNOW_KEY;",
          "const OUTPUT_DIR = path.join(__dirname, \"_site\");",
          "function getAllHtmlFiles(dirPath, arrayOfFiles = []) {",
          "  if (!fs.existsSync(dirPath)) return arrayOfFiles;",
          "  const files = fs.readdirSync(dirPath);",
          "  files.forEach((file) => {",
          "    const fullPath = path.join(dirPath, file);",
          "    if (fs.statSync(fullPath).isDirectory()) {",
          "      arrayOfFiles = getAllHtmlFiles(fullPath, arrayOfFiles);",
          "    } else if (file.endsWith(\".html\")) {",
          "      arrayOfFiles.push(fullPath);",
          "    }",
          "  });",
          "  return arrayOfFiles;",
          "}",
          "try {",
          "  const htmlFiles = getAllHtmlFiles(OUTPUT_DIR);",
          "  let urlList = htmlFiles.map(filePath => {",
          "    let relativePath = path.relative(OUTPUT_DIR, filePath).replace(/\\\\/g, \"/\");",
          "    if (relativePath.endsWith(\"index.html\")) {",
          "      relativePath = relativePath.slice(0, -10);",
          "    } else if (relativePath.endsWith(\".html\")) {",
          "      relativePath = relativePath.slice(0, -5);",
          "    }",
          "    return \"https://\" + DOMAIN + \"/\" + relativePath;",
          "  });",
          "  urlList = urlList.filter(url => !url.includes(\"404\") && !url.includes(\"admin\") && !url.endsWith(\".txt\"));",
          "  if (urlList.length === 0) {",
          "    console.log(\"ℹ️ 未发现有效页面，无需推送。\");",
          "    process.exit(0);",
          "  }",
          "  console.log(\"🚀 正在将 \" + urlList.length + \" 个有效网域 URL 推送给必应集群...\");",
          "  const requestData = JSON.stringify({",
          "    host: DOMAIN,",
          "    key: BING_KEY,",
          "    keyLocation: \"https://\" + DOMAIN + \"/\" + BING_KEY + \".txt\",",
          "    urlList: urlList",
          "  });",
          "  const options = {",
          "    hostname: \"api.indexnow.org\",",
          "    path: \"/IndexNow\",",
          "    method: \"POST\",",
          "    headers: {",
          "      \"Content-Type\": \"application/json; charset=utf-8\",",
          "      \"Content-Length\": Buffer.byteLength(requestData)",
          "    }",
          "  };",
          "  const req = https.request(options, (res) => {",
          "    let body = \"\";",
          "    res.on(\"data\", (chunk) => body += chunk);",
          "    res.on(\"end\", () => {",
          "      if (res.statusCode === 200 || res.statusCode === 202) {",
          "        console.log(\"✅ [完美闭环] 必应 IndexNow 成功接收！状态码: \" + res.statusCode + \" (暗号对接成功)\");",
          "      } else {",
          "        console.error(\"❌ 推送失败，状态码: \" + res.statusCode + \", 响应: \" + body);",
          "      }",
          "    });",
          "  });",
          "  req.on(\"error\", (e) => console.error(\"❌ 请求必应接口失败: \" + e.message));",
          "  req.write(requestData);",
          "  req.end();",
          "} catch (err) {",
          "  console.error(\"❌ 自动化推送运行出错:\", err);",
          "}"
        ];
        fs.writeFileSync("bing-instant-push.js", lines.join("\n"));
        '
        
        # 完美执行推送
        node bing-instant-push.js
