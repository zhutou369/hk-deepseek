name: Gemini Auto Content Updater

on:
  # 🎯 每天北京/香港時間早上 08:12 自動觸發更新 (100% 準時交由外部 Cloudflare 轟炸喚醒)
  schedule:
    - cron: '12 0 * * *'

  # 🎯 手動測試觸發：允許在 GitHub 介面手動點擊按鈕，並配置可輸入的數字選項
  workflow_dispatch:
    inputs:
      post_count:
        description: '本次手動測試生成的文章數量（可選 1-9，不填寫默認更新 1 篇）'
        required: true
        default: '1' # 🌟 核心優化：手動測試默認也改為 1 篇

# 🚀 2026 規範：在全局顯式注入強制使用 Node 24 的環境變量
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TZ: 'Asia/Hong_Kong' # 強制伺服器時區為香港標準時間，確保與你的站群完全對齊

# 允許機器人反向寫入倉庫的最高權限
permissions:
  contents: write

jobs:
  build-and-post:
    runs-on: ubuntu-latest

    steps:
    # 1. 檢出 11ty 項目的全部源碼
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. 部署最新一代的 Node.js 24 生產環境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm' # 自動緩存依賴，加速後續構建

    # 3a. 🛠️ 如果 package.json 存在，則執行 npm install
    - name: Install Existing Dependencies
      run: npm install
      if: hashFiles('package.json') != ''

    # 3b. 🛠️ 如果 package.json 不存在，則初始化
    - name: Initialize Project If Missing
      run: npm init -y
      if: hashFiles('package.json') == ''

    # 3c. 安裝核心官方 AI SDK 與 11ty 構建工具
    - name: Install Production Tools
      run: npm install @google/genai @11ty/eleventy --save-dev

    # 4. 🌟 核心優化：無論定時運行還是手動未填寫，後備默認值全量切換為 '1' 篇
    - name: Run Gemini Content Generator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node autobot.js ${{ github.event.inputs.post_count || '1' }}

    # 5. 強制解鎖 node_modules 可執行特權，阻斷 Exit code 127 錯誤并编译网站
    - name: Build Eleventy Site
      run: |
        chmod -R +x ./node_modules/.bin/
        npx @11ty/eleventy

    # 5b. 🌟【新增核心步骤】已验证站点免文件实时推送至必应 IndexNow 🌟
    - name: Execute Instant SEO Push to Bing
      env:
        INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
      run: |
        # 创建一个临时的 Node 推送脚本并直接执行，无需污染你的源码目录
        cat << 'EOF' > bing-instant-push.js
        const fs = require('fs');
        const path = require('path');
        const https = require('https');

        const DOMAIN = "hk-deepseek.com";
        const BING_KEY = process.env.INDEXNOW_KEY;
        const OUTPUT_DIR = path.join(__dirname, '_site'); // 对应 11ty 的编译发布目录

        if (!BING_KEY) {
          console.error("❌ 错误: 未检测到环境变量 INDEXNOW_KEY，取消推送。");
          process.exit(1);
        }

        function getAllHtmlFiles(dirPath, arrayOfFiles = []) {
          if (!fs.existsSync(dirPath)) return arrayOfFiles;
          const files = fs.readdirSync(dirPath);
          files.forEach((file) => {
            const fullPath = path.join(dirPath, file);
            if (fs.statSync(fullPath).isDirectory()) {
              arrayOfFiles = getAllHtmlFiles(fullPath, arrayOfFiles);
            } else if (file.endsWith('.html')) {
              arrayOfFiles.push(fullPath);
            }
          });
          return arrayOfFiles;
        }

        try {
          const htmlFiles = getAllHtmlFiles(OUTPUT_DIR);
          let urlList = htmlFiles.map(filePath => {
            let relativePath = path.relative(OUTPUT_DIR, filePath).replace(/\\/g, '/');
            if (relativePath.endsWith('index.html')) {
              relativePath = relativePath.slice(0, -10);
            } else if (relativePath.endsWith('.html')) {
              relativePath = relativePath.slice(0, -5);
            }
            return `https://${DOMAIN}/${relativePath}`;
          });

          // 过滤掉不必要的系统页面
          urlList = urlList.filter(url => !url.includes('404') && !url.includes('admin'));

          if (urlList.length === 0) {
            console.log("ℹ️ 未发现有效页面，无需推送。");
            process.exit(0);
          }

          console.log(`🚀 检测到已验证站点，正在将 ${urlList.length} 个活体 URL 发送给必应...`);

          const requestData = JSON.stringify({
            host: DOMAIN,
            key: BING_KEY,
            keyLocation: `https://${DOMAIN}/${BING_KEY}.txt`,
            urlList: urlList
          });

          const options = {
            hostname: 'api.indexnow.org',
            path: '/IndexNow',
            method: 'POST',
            headers: {
              'Content-Type': 'application/json; charset=utf-8',
              'Content-Length': Buffer.byteLength(requestData)
            }
          };

          const req = https.request(options, (res) => {
            let body = '';
            res.on('data', (chunk) => body += chunk);
            res.on('end', () => {
              // 🌟 修复判定逻辑：200 和 202 都代表必应成功接收
              if (res.statusCode === 200 || res.statusCode === 202) {
                console.log(`✅ 必应 IndexNow 成功接收！状态码: ${res.statusCode} (已成功送达必应抓取队列)`);
              } else {
                console.error(`❌ 推送失败，状态码: ${res.statusCode}, 响应: ${body}`);
              }
            });
          });

          req.on('error', (e) => console.error(`❌ 请求必应接口失败: ${e.message}`));
          req.write(requestData);
          req.end();

        } catch (err) {
          console.error("❌ 自动化推送运行出错:", err);
        }
        EOF
        
        # 执行刚才生成的临时脚本
        node bing-instant-push.js

    # 6. 檢查是否有新文章誕生，並自動推回 GitHub
    - name: Commit and Push Changes back to Repo
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Gemini-Content-Bot"
        git config --global user.email "bot@yourdomain.com"
        
        # 只將源碼與詞庫變更推回 main 分支
        git add src/posts/ src/keywords.json
        
        # 檢查是否有代碼改變（包括 keywords.json 的減少、posts 內新 md 的增加）
        if ! git diff --cached --quiet; then
          git commit -m "🤖 [Bot] 自動同步/手動測試：更新文章並同步詞庫"
          # 在最後加上 -f 特權鎖，暴力解決 [rejected] 歷史斷層衝突，強制覆蓋遠端
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main -f
          echo "✅ 成功將新文章與更新後的詞庫同步回 GitHub 倉庫！"
        else
          echo "⚠️ 檢查發現本地文件無任何变化，本次自動跳過推送。"
        fi
